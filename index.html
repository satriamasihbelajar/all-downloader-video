<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Video Downloader ⚡</title>

  <meta name="description" content="Download video dari TikTok, Instagram, Facebook dengan cepat dan gratis.">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #0f0f0f, #050505);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 32px;
      background: linear-gradient(90deg, #ff0050, #00f2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      margin-top: 20px;
      padding: 15px;
      width: 300px;
      border-radius: 15px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      margin-top: 15px;
      padding: 14px 25px;
      border-radius: 15px;
      border: none;
      background: linear-gradient(90deg, #ff0050, #00f2ff);
      color: white;
      cursor: pointer;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      display: inline-block;
    }

    #result {
      margin-top: 30px;
    }

    footer {
      position: fixed;
      bottom: 15px;
      width: 100%;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>All Video Downloader ⚡</h1>
  <p>Paste link dari TikTok, IG, Facebook, dll</p>

  <div class="card">
    <input type="text" id="link" placeholder="Paste link di sini..." />
    <br>
    <button onclick="downloadVideo()">Download</button>
  </div>

  <div id="result"></div>
</div>

<footer>
  ⚡ by Satria
</footer>

<script>
async function downloadVideo() {
  let url = document.getElementById("link").value;
  let result = document.getElementById("result");

  result.innerHTML = "⏳ Loading...";

  try {
    let res = await fetch(`https://tikwm.com/api/?url=${url}`);
    let data = await res.json();

    if (data && data.data) {
      result.innerHTML = `
        <video src="${data.data.play}" controls width="320"></video>
        <br><br>
        <a href="${data.data.play}" download>
          <button>Download Video</button>
        </a>
      `;
    } else {
      result.innerHTML = "❌ Gagal / tidak support";
    }
  } catch (e) {
    result.innerHTML = "⚠️ Error bro";
  }
}
</script>

</body>
</html>
